name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-latest
            script: bash scripts/build-release.sh
          - name: linux-x86_64
            os: ubuntu-latest
            script: bash scripts/build-release.sh
          - name: windows-x86_64
            os: windows-latest
            script: pwsh scripts/build-release.ps1

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.name == 'macos-universal' && 'aarch64-apple-darwin,x86_64-apple-darwin' || (matrix.name == 'linux-x86_64' && 'x86_64-unknown-linux-gnu' || 'x86_64-pc-windows-msvc') }}

      - name: Linux GUI deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libdbus-1-dev pkg-config

      - name: Install cargo-deb (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-deb --locked

      - name: Install create-dmg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Install cargo-wix (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo install cargo-wix --locked
        shell: pwsh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: ${{ matrix.script }}
        shell: bash
        if: matrix.os != 'windows-latest'

      - name: Build release (windows)
        run: ${{ matrix.script }}
        shell: pwsh
        if: matrix.os == 'windows-latest'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
            dist/*.deb
            dist/*.msi
            dist/*.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
            dist/*.deb
            dist/*.msi
            dist/*.sha256
          generate_release_notes: true
